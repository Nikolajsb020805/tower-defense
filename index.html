<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense</title>
    <!-- 1. Load Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50; /* Dark background looks better for games */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #game-container {
            border: 4px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Phaser will inject the canvas here because of the 'parent' property in main.js -->
        <div id="gameCanvas"></div>
    </div>

    <!-- 2. Load your main game file -->
    <script type="module" src="main.js"></script>
</body>
</html>
